<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo WebApp</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <div class="stat-container">
            <div class="details">
                <h1>ToDo WebApp</h1>
                <p>Complete your tasks !!</p>
                <div id="progress-bar">
                    <div id="progress"></div>
                </div>
            </div>
            <div class="stats-numbers">
                <p id="numbers">0 / 0</p>
            </div>
        </div>

        <form>
            <input type="text" id="taskInput" placeholder="Write your task">
            <button id="new-task" type="submit">+</button>
        </form>  

        <ul class="task-list"></ul>
    </div>
    <script src="./app.js?v=2"></script><script
            src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.0.0-beta.16/tsparticles.confetti.bundle.min.js"></script>
</body>
</html>
